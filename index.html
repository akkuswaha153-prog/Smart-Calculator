<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.calculator {
    width: 320px;
    background: #1e293b;
    border-radius: 20px;
    padding: 15px;
}

/* Screen */
#screen {
    width: 100%;
    height: 70px;
    font-size: 28px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
    text-align: right;
    padding: 10px;
    background: #0f172a;
    color: white;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

button {
    padding: 16px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

.op { background: #3b82f6; }
.equal { background: #22c55e; }
.clear { background: #ef4444; }
.back { background: #f59e0b; }

/* Ads */
.ad {
    margin: 10px 0;
    text-align: center;
}
</style>
</head>

<body>

<div class="calculator">

<!-- TOP AD -->
<div class="ad">
<iframe src="YOUR_ADSTERA_DIRECT_LINK" width="300" height="50"></iframe>
</div>

<input id="screen" readonly>

<div class="buttons">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="press('-')">−</button>

    <button onclick="press('0')">0</button>
    <button class="back" onclick="back()">⌫</button>
    <button class="equal" onclick="calc()">=</button>
    <button class="op" onclick="press('+')">+</button>

    <button class="clear" onclick="clearScr()" style="grid-column: span 4;">Clear</button>
</div>

<!-- BOTTOM AD -->
<div class="ad">
<iframe src="YOUR_ADSTERA_DIRECT_LINK" width="300" height="50"></iframe>
</div>

</div>

<script>
function press(val){
    document.getElementById("screen").value += val;
}

function clearScr(){
    document.getElementById("screen").value = "";
}

function back(){
    let s = document.getElementById("screen").value;
    document.getElementById("screen").value = s.slice(0,-1);
}

function calc(){
    try{
        let result = new Function("return " + document.getElementById("screen").value)();
        document.getElementById("screen").value = result;
    } catch {
        document.getElementById("screen").value = "Error";
    }
}
</script>

</body>
</html>
