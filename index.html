<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card UI */
.calculator {
    width: 320px;
    background: #1e293b;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Screen */
#screen {
    width: 100%;
    height: 70px;
    font-size: 28px;
    border-radius: 12px;
    border: none;
    margin-bottom: 15px;
    text-align: right;
    padding: 10px;
    background: #0f172a;
    color: #fff;
}

/* Grid */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* Buttons */
button {
    padding: 18px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #334155;
    color: white;
    transition: 0.2s;
}

button:active {
    transform: scale(0.92);
    background: #475569;
}

/* Colors */
.op { background: #3b82f6; }
.equal { background: #22c55e; }
.clear { background: #ef4444; }
.back { background: #f59e0b; }

</style>
</head>

<body>

<div class="calculator">

<input id="screen" readonly>

<div class="buttons">
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="press('-')">−</button>

    <button onclick="press('0')">0</button>
    <button class="back" onclick="back()">⌫</button>
    <button class="equal" onclick="calc()">=</button>
    <button class="op" onclick="press('+')">+</button>

    <button class="clear" onclick="clearScr()" style="grid-column: span 4;">Clear</button>
</div>

</div>

<!-- Sound -->
<audio id="clickSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

<script>
function playSound(){
    let sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.play();
}

function press(val){
    playSound();
    document.getElementById("screen").value += val;
}

function clearScr(){
    playSound();
    document.getElementById("screen").value = "";
}

function back(){
    playSound();
    let s = document.getElementById("screen").value;
    document.getElementById("screen").value = s.slice(0,-1);
}

function calc(){
    playSound();
    try{
        let result = new Function("return " + document.getElementById("screen").value)();
        document.getElementById("screen").value = result;
    } catch {
        document.getElementById("screen").value = "Error";
    }
}
</script>

</body>
</html>
