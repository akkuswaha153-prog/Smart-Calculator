<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Calculator Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    width: 330px;
    background: #1e293b;
    border-radius: 20px;
    padding: 15px;
}

/* Ads */
.ad {
    text-align: center;
    margin: 8px 0;
    color: #94a3b8;
    font-size: 12px;
}

/* Screen */
#screen {
    width: 100%;
    height: 60px;
    font-size: 24px;
    border-radius: 10px;
    border: none;
    margin-bottom: 5px;
    text-align: right;
    padding: 10px;
    background: #020617;
    color: #fff;
}

/* History */
#history {
    font-size: 13px;
    color: #94a3b8;
    text-align: right;
    margin-bottom: 8px;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

button {
    padding: 14px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #334155;
    color: white;
}

.op { background: #3b82f6; }
.equal { background: #22c55e; }
.clear { background: #ef4444; }
.back { background: #f59e0b; }
.info { background: #64748b; }
</style>
</head>

<body>

<div class="calculator">

<!-- TOP AD -->
<div class="ad">
    <div id="adTop">Ad loading...</div>
    <iframe src="YOUR_AD_LINK" width="300" height="50"
    onload="document.getElementById('adTop').innerText=''"></iframe>
</div>

<div id="history"></div>
<input id="screen" readonly>

<div class="buttons">

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="op" onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="op" onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="op" onclick="press('-')">−</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="percent()">%</button>
    <button class="op" onclick="press('+')">+</button>

    <button onclick="square()">x²</button>
    <button onclick="sqrt()">√</button>
    <button class="back" onclick="back()">⌫</button>
    <button class="equal" onclick="calc()">=</button>

    <button class="clear" onclick="clearScr()" style="grid-column: span 2;">Clear</button>
    <button class="info" onclick="about()">About</button>

</div>

<!-- BOTTOM AD -->
<div class="ad">
    <div id="adBottom">Ad loading...</div>
    <iframe src="YOUR_AD_LINK" width="300" height="50"
    onload="document.getElementById('adBottom').innerText=''"></iframe>
</div>

</div>

<script>
function press(val){
    document.getElementById("screen").value += val;
}

function clearScr(){
    document.getElementById("screen").value = "";
}

function back(){
    let s = document.getElementById("screen").value;
    document.getElementById("screen").value = s.slice(0,-1);
}

function percent(){
    let val = document.getElementById("screen").value;
    document.getElementById("screen").value = val/100;
}

function square(){
    let val = document.getElementById("screen").value;
    document.getElementById("screen").value = val*val;
}

function sqrt(){
    let val = document.getElementById("screen").value;
    document.getElementById("screen").value = Math.sqrt(val);
}

function calc(){
    try{
        let exp = document.getElementById("screen").value;
        let result = new Function("return " + exp)();
        document.getElementById("history").innerText = exp + " =";
        document.getElementById("screen").value = result;
    } catch {
        document.getElementById("screen").value = "Error";
    }
}

function about(){
    alert("Smart Calculator Pro\nVersion 1.0\n\nFast, simple and secure calculator.\nNo data is collected.");
}
</script>

</body>
</html>
